<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>My Library</h1>

        <form action="/" method="GET">
            <label for="search">Search by title:</label>
            <input type="text" id="search" name="search" value="{{ search_term }}" placeholder="Enter book title">

            <label for="sort">Sort by:</label>
            <select name="sort" id="sort">
                <option value="title" {% if sort_data == "title" %}selected{% endif %}>Title</option>
                <option value="author" {% if sort_data == "author" %}selected{% endif %}>Author</option>
            </select>

            <button type="submit">Search</button>
        </form>

        {% if books %}
            {% for book in books %}
                <div>
                    <h3>
                        <img src="https://covers.openlibrary.org/b/isbn/{{ book.isbn }}-M.jpg" alt="Cover of {{ book.title }}">
                        {{ book.title }}
                    </h3>
                    <p><strong>Author:</strong> {{ book.author.name }}</p>
                    <p><strong>Publication Year:</strong> {{ book.publication_year }}</p>
                    <p><strong>ISBN:</strong> {{ book.isbn }}</p>
                </div>
            {% endfor %}
        {% else %}
            <p class="error">No books found matching your search.</p>
        {% endif %}
    </div>
</body>
</html>
